<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      color: #374151;
      background: #fff;
      padding: 8px;
    }

    /* Section */
    .section { margin-bottom: 8px; }
    .section-title {
      font-size: 0.5625rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .separator { height: 1px; background: #e4e4e7; margin: 8px 0; }

    /* Buttons - matches PanelButton */
    .btn {
      padding: 4px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.5625rem;
      font-weight: 500;
      transition: all 0.15s;
      outline: none;
    }
    .btn-primary { background: #e0e7ff; color: #4f46e5; }
    .btn-primary:hover { background: #c7d2fe; }
    .btn-danger { background: transparent; color: #dc2626; border: none; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-default { background: #f4f4f5; color: #71717a; }
    .btn-default:hover { background: #e4e4e7; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #e4e4e7;
      border-radius: 4px;
      padding: 16px;
      text-align: center;
      color: #9ca3af;
      font-size: 0.625rem;
      transition: all 0.15s;
      cursor: pointer;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }
    #drop-zone.dragover { border-color: #a5b4fc; background: #e0e7ff; color: #4f46e5; }
    #drop-zone.has-file { border-color: #a5b4fc; background: #e0e7ff; }
    #drop-zone .filename { font-weight: 600; color: #374151; }

    /* SVG preview */
    #svg-preview {
      width: 64px;
      height: 64px;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      margin: 4px auto;
    }
    #svg-preview img { max-width: 56px; max-height: 56px; }

    /* Radio/Checkbox - matches PanelCheckbox */
    .option-group { display: flex; gap: 8px; margin: 4px 0; }
    .option-group label {
      font-size: 0.625rem;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    /* Checkbox - matches index.css custom checkbox */
    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #d1d5db;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      background-color: white;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    input[type="checkbox"]:checked {
      background-color: #a5b4fc;
      border-color: #a5b4fc;
    }
    input[type="checkbox"]:checked::after {
      content: '\2713';
      position: absolute;
      color: #4f46e5;
      font-size: 12px;
      font-weight: bold;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    /* Radio - same color scheme */
    input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      background-color: white;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    input[type="radio"]:checked {
      border-color: #a5b4fc;
    }
    input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #a5b4fc;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .option-group input[type="radio"],
    .option-group input[type="checkbox"] {
      cursor: pointer;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .checkbox-row label {
      font-size: 0.625rem;
      color: #374151;
      cursor: pointer;
    }

    /* Slider - matches PanelSlider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
    }
    .slider-row .slider-label {
      font-size: 0.625rem;
      color: #374151;
      min-width: 36px;
    }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .slider-value {
      width: 28px;
      text-align: right;
      font-size: 0.5625rem;
      font-weight: 500;
      color: #6b7280;
    }
    input[type="range"] {
      -webkit-appearance: none;
      height: 4px;
      background: #e4e4e7;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0,0,0,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0,0,0,0.2);
    }

    /* Color input */
    .color-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
    }
    .color-input-row .slider-label {
      font-size: 0.625rem;
      color: #374151;
      min-width: 80px;
    }
    .color-input-row input[type="text"] {
      flex: 1;
      padding: 2px 6px;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      font-size: 0.625rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #374151;
      outline: none;
    }
    .color-input-row input[type="text"]:focus {
      border-color: #a5b4fc;
    }

    /* Manifest output - matches PanelValueBox */
    #manifest-output {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.5625rem;
      background: #f9fafb;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      padding: 4px 6px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      color: #374151;
    }

    .status { font-size: 0.5625rem; color: #6b7280; margin-top: 4px; }
    .action-row { display: flex; gap: 4px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">SVG File</div>
    <div id="drop-zone">
      <div>Drop SVG here or click to select</div>
      <input type="file" id="file-input" accept=".svg" style="display: none" />
    </div>
    <div id="svg-preview" style="display: none;"><img id="preview-img" /></div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Category</div>
    <div class="option-group">
      <label><input type="radio" name="category" value="vehicle" checked /> Vehicle</label>
      <label><input type="radio" name="category" value="pedestrian" /> Pedestrian</label>
    </div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Size</div>
    <div class="checkbox-row">
      <input type="checkbox" id="lock-aspect" checked />
      <label for="lock-aspect">Lock aspect ratio</label>
    </div>
    <div class="slider-row">
      <span class="slider-label">Width</span>
      <input type="range" id="width" min="5" max="500" value="30" />
      <span class="slider-value" id="width-value">30</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">Height</span>
      <input type="range" id="height" min="5" max="500" value="56" />
      <span class="slider-value" id="height-value">56</span>
    </div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Color Mode</div>
    <div class="option-group">
      <label><input type="radio" name="colorMode" value="full" checked /> Full</label>
      <label><input type="radio" name="colorMode" value="partial" /> Partial</label>
    </div>
    <div class="color-input-row" id="replace-color-row" style="display: none;">
      <span class="slider-label">replaceColor</span>
      <input type="text" id="replace-color" value="#b3b3b3" placeholder="#hexcolor" />
    </div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="action-row">
      <button class="btn btn-primary" id="btn-register" disabled style="flex: 1;">Register on Canvas</button>
      <button class="btn btn-danger" id="btn-unregister" disabled>Remove</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">manifest.json entry</div>
    <div id="manifest-output">Load an SVG file to generate</div>
    <button class="btn btn-default" id="btn-copy" style="margin-top: 4px; width: 100%;" disabled>Copy to Clipboard</button>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
