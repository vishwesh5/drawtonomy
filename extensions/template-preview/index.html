<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      color: #374151;
      background: #fff;
      padding: 8px;
    }
    h3 { font-size: 11px; font-weight: 600; color: #1e1e1e; margin-bottom: 8px; }

    .section { margin-bottom: 8px; }
    .section-title {
      font-size: 9px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .separator { height: 1px; background: #e4e4e7; margin: 8px 0; }

    .btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      font-weight: 500;
      transition: all 0.15s;
      outline: none;
    }
    .btn-primary { background: #e0e7ff; color: #4f46e5; }
    .btn-primary:hover { background: #c7d2fe; }
    .btn-danger { background: #fef2f2; color: #dc2626; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-default { background: #f4f4f5; color: #71717a; }
    .btn-default:hover { background: #e4e4e7; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      color: #9ca3af;
      font-size: 10px;
      transition: all 0.2s;
      cursor: pointer;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }
    #drop-zone.dragover { border-color: #a5b4fc; background: #eef2ff; color: #4f46e5; }
    #drop-zone.has-file { border-color: #86efac; background: #f0fdf4; }
    #drop-zone .filename { font-weight: 600; color: #374151; }

    /* SVG preview */
    #svg-preview {
      width: 64px;
      height: 64px;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      margin: 4px auto;
    }
    #svg-preview img { max-width: 56px; max-height: 56px; }

    /* Radio group */
    .radio-group { display: flex; gap: 8px; margin: 4px 0; }
    .radio-group label { font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 3px; }

    /* Slider row */
    .slider-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    .slider-row label { font-size: 10px; min-width: 40px; }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .value { width: 32px; text-align: right; font-size: 10px; font-weight: 500; color: #6b7280; }
    input[type="range"] {
      -webkit-appearance: none;
      height: 4px;
      background: #e4e4e7;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0,0,0,0.2);
    }

    /* Manifest output */
    #manifest-output {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 9px;
      background: #f9fafb;
      border: 1px solid #e4e4e7;
      border-radius: 4px;
      padding: 6px 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      color: #374151;
    }

    .status { font-size: 9px; color: #6b7280; margin-top: 4px; }
    .action-row { display: flex; gap: 4px; margin-top: 6px; }

    /* Color input */
    .color-input-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    .color-input-row label { font-size: 10px; min-width: 80px; }
    .color-input-row input[type="text"] {
      flex: 1;
      padding: 2px 6px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 10px;
      font-family: 'SF Mono', monospace;
    }
  </style>
</head>
<body>
  <h3>Template Preview</h3>

  <div class="section">
    <div class="section-title">SVG File</div>
    <div id="drop-zone">
      <div>Drop SVG here or click to select</div>
      <input type="file" id="file-input" accept=".svg" style="display: none" />
    </div>
    <div id="svg-preview" style="display: none;"><img id="preview-img" /></div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Category</div>
    <div class="radio-group">
      <label><input type="radio" name="category" value="vehicle" checked /> Vehicle</label>
      <label><input type="radio" name="category" value="pedestrian" /> Pedestrian</label>
    </div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Size</div>
    <div class="slider-row">
      <label>Width</label>
      <input type="range" id="width" min="5" max="100" value="30" />
      <span class="value" id="width-value">30</span>
    </div>
    <div class="slider-row">
      <label>Height</label>
      <input type="range" id="height" min="5" max="200" value="56" />
      <span class="value" id="height-value">56</span>
    </div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Color Mode</div>
    <div class="radio-group">
      <label><input type="radio" name="colorMode" value="full" checked /> Full (replaceColor: null)</label>
      <label><input type="radio" name="colorMode" value="partial" /> Partial</label>
    </div>
    <div class="color-input-row" id="replace-color-row" style="display: none;">
      <label>replaceColor</label>
      <input type="text" id="replace-color" value="#b3b3b3" placeholder="#hexcolor" />
    </div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="action-row">
      <button class="btn btn-primary" id="btn-register" disabled style="flex: 1;">Register on Canvas</button>
      <button class="btn btn-danger" id="btn-unregister" disabled>Remove</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">manifest.json entry</div>
    <div id="manifest-output">Load an SVG file to generate</div>
    <button class="btn btn-default" id="btn-copy" style="margin-top: 4px; width: 100%;" disabled>Copy to Clipboard</button>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
