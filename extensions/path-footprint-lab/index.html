<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Path Footprint Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      color: #374151;
      background: #fff;
      padding: 8px;
    }
    h3 { font-size: 11px; font-weight: 600; color: #1e1e1e; margin-bottom: 8px; }

    /* Section */
    .section { margin-bottom: 8px; }
    .section-title {
      font-size: 9px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .separator { height: 1px; background: #e4e4e7; margin: 8px 0; }

    /* Info box */
    #info {
      font-size: 9px;
      color: #6b7280;
      background: #f9fafb;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    #path-info {
      font-size: 10px;
      color: #374151;
      background: #f9fafb;
      padding: 4px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    /* Buttons */
    .btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      font-weight: 500;
      transition: all 0.15s;
      outline: none;
    }
    .btn-default {
      background: #f4f4f5;
      color: #71717a;
    }
    .btn-default:hover { background: #e4e4e7; }
    .btn-primary {
      background: #e0e7ff;
      color: #4f46e5;
    }
    .btn-primary:hover { background: #c7d2fe; }
    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
    }
    .btn-danger:hover { background: #fee2e2; }
    .btn-small {
      padding: 2px 6px;
      font-size: 9px;
    }

    /* Slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #e4e4e7;
      border-radius: 2px;
      outline: none;
      margin: 4px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
    }

    /* Footprint row */
    .footprint-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
      padding: 4px 6px;
      background: #f9fafb;
      border-radius: 4px;
      border: 1px solid #e4e4e7;
    }
    .footprint-row .index {
      width: 16px;
      font-size: 9px;
      color: #9ca3af;
      text-align: center;
    }
    .footprint-row input[type="range"] { flex: 1; }
    .footprint-row .t-value {
      width: 32px;
      text-align: right;
      font-size: 9px;
      font-weight: 500;
      color: #6b7280;
    }
    .footprint-row .btn-remove {
      width: 18px;
      height: 18px;
      padding: 0;
      font-size: 10px;
      line-height: 18px;
      text-align: center;
      background: none;
      color: #dc2626;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .footprint-row .btn-remove:hover { background: #fef2f2; }

    /* Format buttons */
    .format-btn { flex: none; padding: 4px 8px; }
    .format-btn.active { background: #e0e7ff; color: #4f46e5; }

    /* Template buttons */
    .template-btn {
      width: 36px;
      height: 36px;
      padding: 2px;
      border-radius: 6px;
      border: 1px solid #e4e4e7;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .template-btn:hover { border-color: #a5b4fc; }
    .template-btn.active {
      border: 2px solid #a5b4fc;
      background: #e0e7ff;
    }
    .template-btn span {
      font-size: 7px;
      color: #6b7280;
      text-align: center;
      line-height: 1.1;
    }

    /* Status */
    .status {
      font-size: 9px;
      color: #6b7280;
      margin-top: 4px;
    }

    /* Action row */
    .action-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="info">Draw a path using the Path tool, select it, then use this panel.</div>

  <div class="section">
    <div class="section-title">Selected Path</div>
    <div id="path-info">No path selected</div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Template</div>
    <div id="template-grid" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Variable Positioning</div>
    <div id="footprint-list"></div>
    <button class="btn btn-default" onclick="addFootprint()" style="margin-top: 4px;">+ Add Footprint</button>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="action-row">
      <button class="btn btn-primary" onclick="applyFootprints()" style="flex: 1;">Apply to Selected Path</button>
      <button class="btn btn-danger" onclick="clearFootprints()">Clear All</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="separator"></div>

  <div class="section">
    <div class="section-title">Export</div>
    <div style="display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;">
      <button class="btn btn-default format-btn active" data-format="svg">SVG</button>
      <button class="btn btn-default format-btn" data-format="png">PNG</button>
      <button class="btn btn-default format-btn" data-format="jpeg">JPEG</button>
      <button class="btn btn-default format-btn" data-format="pdf">PDF</button>
      <button class="btn btn-default format-btn" data-format="eps">EPS</button>
      <button class="btn btn-default format-btn" data-format="drawtonomy.svg">.drawtonomy.svg</button>
    </div>
    <button class="btn btn-default" onclick="exportScene()" style="width: 100%;">Export</button>
    <div class="status" id="export-status"></div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
