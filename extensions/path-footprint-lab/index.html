<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Path Footprint Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      color: #374151;
      background: #fff;
      padding: 8px;
    }
    h3 { font-size: 11px; font-weight: 600; color: #1e1e1e; margin-bottom: 8px; }

    /* Section */
    .section { margin-bottom: 8px; }
    .section-title {
      font-size: 9px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .separator { height: 1px; background: #e4e4e7; margin: 8px 0; }

    /* No-path empty state */
    #no-path-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      text-align: center;
      color: #9ca3af;
      padding: 24px 16px;
    }
    #no-path-state .empty-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    #no-path-state .empty-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 4px;
    }
    #no-path-state .empty-hint {
      font-size: 10px;
      color: #9ca3af;
      line-height: 1.4;
    }

    /* Path-selected panel */
    #path-panel { display: none; }

    /* Info box */
    #path-info {
      font-size: 10px;
      color: #374151;
      background: #f9fafb;
      padding: 4px 6px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    /* Participant count badge */
    .participant-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      background: #e0e7ff;
      color: #4f46e5;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 4px;
    }

    /* Buttons */
    .btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 9px;
      font-weight: 500;
      transition: all 0.15s;
      outline: none;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-default {
      background: #f4f4f5;
      color: #71717a;
    }
    .btn-default:hover:not(:disabled) { background: #e4e4e7; }
    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: #4338ca; }
    .btn-success {
      background: #059669;
      color: #fff;
    }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .btn-danger {
      background: #fef2f2;
      color: #dc2626;
    }
    .btn-danger:hover:not(:disabled) { background: #fee2e2; }
    .btn-small {
      padding: 2px 6px;
      font-size: 9px;
    }

    /* CTA button for first-time placement */
    .btn-cta {
      background: #4f46e5;
      color: #fff;
      width: 100%;
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 6px;
      margin-top: 6px;
    }
    .btn-cta:hover:not(:disabled) { background: #4338ca; }

    /* Update needed banner */
    .update-banner {
      display: none;
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 6px 8px;
      margin-top: 6px;
      font-size: 9px;
      color: #92400e;
      text-align: center;
    }
    .update-banner .update-text {
      margin-bottom: 4px;
    }
    .update-banner .btn-update {
      background: #f59e0b;
      color: #fff;
      width: 100%;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .update-banner .btn-update:hover { background: #d97706; }

    /* Slider */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #e4e4e7;
      border-radius: 2px;
      outline: none;
      margin: 4px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #a5b4fc;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
    }

    /* Footprint row */
    .footprint-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
      padding: 4px 6px;
      background: #f9fafb;
      border-radius: 4px;
      border: 1px solid #e4e4e7;
    }
    .footprint-row .index {
      width: 16px;
      font-size: 9px;
      color: #9ca3af;
      text-align: center;
    }
    .footprint-row input[type="range"] { flex: 1; }
    .footprint-row .t-value {
      width: 32px;
      text-align: right;
      font-size: 9px;
      font-weight: 500;
      color: #6b7280;
    }
    .footprint-row .btn-remove {
      width: 18px;
      height: 18px;
      padding: 0;
      font-size: 10px;
      line-height: 18px;
      text-align: center;
      background: none;
      color: #dc2626;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .footprint-row .btn-remove:hover { background: #fef2f2; }

    /* Format buttons */
    .format-btn { flex: none; padding: 4px 8px; }
    .format-btn.active { background: #e0e7ff; color: #4f46e5; }

    /* Template buttons */
    .template-btn {
      width: 36px;
      height: 36px;
      padding: 2px;
      border-radius: 6px;
      border: 1px solid #e4e4e7;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .template-btn:hover { border-color: #a5b4fc; }
    .template-btn.active {
      border: 2px solid #a5b4fc;
      background: #e0e7ff;
    }
    .template-btn span {
      font-size: 7px;
      color: #6b7280;
      text-align: center;
      line-height: 1.1;
    }

    /* Status */
    .status {
      font-size: 9px;
      color: #6b7280;
      margin-top: 4px;
    }

    /* Action row */
    .action-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    /* Live indicator */
    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 3px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <!-- ==================== NO PATH SELECTED STATE ==================== -->
  <div id="no-path-state">
    <svg class="empty-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 38 C14 26, 20 14, 24 12 S34 18, 38 10" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-dasharray="4 3"/>
      <circle cx="10" cy="38" r="3" fill="#d1d5db"/>
      <circle cx="38" cy="10" r="3" fill="#d1d5db"/>
      <rect x="20" y="20" width="8" height="14" rx="1" stroke="#d1d5db" stroke-width="1.5" fill="none"/>
    </svg>
    <div class="empty-title">No Path Selected</div>
    <div class="empty-hint">Draw a path using the Path tool, then select it to place participants along it.</div>
  </div>

  <!-- ==================== PATH SELECTED PANEL ==================== -->
  <div id="path-panel">

    <!-- Path Info -->
    <div class="section">
      <div class="section-title">Selected Path</div>
      <div id="path-info">No path selected</div>
    </div>

    <div class="separator"></div>

    <!-- Template -->
    <div class="section">
      <div class="section-title">Template</div>
      <div id="template-grid" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
    </div>

    <div class="separator"></div>

    <!-- Variable Positioning -->
    <div class="section">
      <div class="section-title">
        Participants
        <span class="participant-badge" id="participant-count">0</span>
      </div>

      <div id="footprint-list"></div>

      <div style="display: flex; gap: 4px; margin-top: 4px;">
        <button class="btn btn-default" onclick="addFootprint()" style="flex:1;">+ Add Participant</button>
        <button class="btn btn-danger btn-small" onclick="removeLastFootprint()" id="btn-remove-last" style="display:none;">− Remove Last</button>
      </div>

      <!-- FIRST TIME: Place Participants CTA -->
      <button class="btn btn-cta" id="btn-place" onclick="placeParticipants()" style="display:none;">
        ▶ Place Participants on Path
      </button>

      <!-- UPDATE NEEDED: after adding/removing participants -->
      <div class="update-banner" id="update-banner">
        <div class="update-text">Participant count changed — update positions to sync.</div>
        <button class="btn btn-update" onclick="updateParticipantPositions()">
          ↻ Update Positions
        </button>
      </div>

      <!-- LIVE indicator shown when sliders are active -->
      <div id="live-indicator" style="display:none; margin-top: 6px; font-size: 9px; color: #22c55e;">
        <span class="live-dot"></span> Live — drag sliders to reposition
      </div>
    </div>

    <div class="separator"></div>

    <!-- Actions -->
    <div class="section">
      <div class="action-row">
        <button class="btn btn-danger" onclick="clearFootprints()" style="flex:1;">Clear All Participants</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="separator"></div>

    <!-- Export -->
    <div class="section">
      <div class="section-title">Export</div>
      <div style="display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;">
        <button class="btn btn-default format-btn active" data-format="svg">SVG</button>
        <button class="btn btn-default format-btn" data-format="png">PNG</button>
        <button class="btn btn-default format-btn" data-format="jpeg">JPEG</button>
        <button class="btn btn-default format-btn" data-format="pdf">PDF</button>
        <button class="btn btn-default format-btn" data-format="eps">EPS</button>
        <button class="btn btn-default format-btn" data-format="drawtonomy.svg">.drawtonomy.svg</button>
      </div>
      <button class="btn btn-default" onclick="exportScene()" style="width: 100%;">Export</button>
      <div class="status" id="export-status"></div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
